name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quick:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/mvp/package-lock.json
      - name: Install backend
        working-directory: apps/api
        run: uv sync --all-extras --dev --locked
      - name: Install frontend
        working-directory: apps/mvp
        run: npm ci
      - name: Run quick Development Harness
        run: scripts/quality-gate.sh quick

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run source and locked dependency scans
        run: scripts/quality-gate.sh security

name: gerclaw

x-api-base: &api-base
  image: ${GERCLAW_API_IMAGE}
  build:
    context: ./apps/api
    target: production
    args:
      PYTHON_IMAGE: ${PYTHON_IMAGE}
  env_file:
    - path: ./.env
      required: false
  volumes:
    - "${GERCLAW_KNOWLEDGE_BASE_HOST_PATH}:/knowledge-base:ro"
    - runtime_secrets:/app/workspaces
  networks:
    - edge
    - data

services:
  web:
    image: ${GERCLAW_WEB_IMAGE}
    build:
      context: ./apps/mvp
      target: production
      args:
        NODE_IMAGE: ${NODE_IMAGE}
        NPM_REGISTRY: ${NPM_REGISTRY}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION}
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:${WEB_PORT}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edge
    restart: unless-stopped

  migrate:
    <<: *api-base
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  rag-index:
    <<: *api-base
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: ["gerclaw-rag-index"]
    restart: "no"

  test-db-init:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      TEST_DATABASE: ${POSTGRES_TEST_DB}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        if [ "$$(psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$${TEST_DATABASE}'")" != "1" ]; then
          createdb "$${TEST_DATABASE}"
        fi
    networks:
      - data
    restart: "no"

  test-api:
    <<: *api-base
    image: ${GERCLAW_API_TEST_IMAGE}
    profiles: ["test"]
    build:
      context: ./apps/api
      target: test
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE}
    depends_on:
      test-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command:
      - /bin/sh
      - -ec
      - |
        GERCLAW_DATABASE_URL="$${GERCLAW_TEST_DATABASE_URL}" alembic upgrade head
        GERCLAW_DATABASE_URL="$${GERCLAW_TEST_DATABASE_URL}" alembic check
        pytest -q -m 'not external'
    restart: "no"

  api:
    <<: *api-base
    ports:
      - "127.0.0.1:${API_PORT}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: ["uvicorn", "gerclaw_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} --no-auth-warning ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.2
    environment:
      QDRANT__SERVICE__API_KEY: ${GERCLAW_QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - data
    restart: unless-stopped

networks:
  edge:
  data:
    internal: true

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  runtime_secrets:

services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  qdrant:
    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"

  test-db-init:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-gerclaw}
      PGPASSWORD: ${POSTGRES_PASSWORD:-local-postgres-only}
      TEST_DATABASE: ${POSTGRES_TEST_DB:-gerclaw_test}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        if [ "$$(psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$${TEST_DATABASE}'")" != "1" ]; then
          createdb "$${TEST_DATABASE}"
        fi
    networks:
      - data
    restart: "no"

networks:
  data:
    internal: false
